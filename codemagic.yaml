workflows:
  ios-release:
    name: iOS Release - App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Inna Rosha

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: innaroshaproject.com
      xcode: 16.1

    scripts:
      - name: Load project config
        script: |
          cd $CM_BUILD_DIR
          ruby -ryaml -e '
            config = YAML.load_file("project_config.yml")
            config.each do |k, v|
              env_key = k.upcase
              File.open(ENV["CM_ENV"], "a") { |f| f.puts "#{env_key}=#{v}" }
              puts "  #{env_key}=#{v}"
            end
          '

      - name: Install CocoaPods dependencies
        script: |
          if [ -f "Podfile" ]; then
            pod install
          fi
        working_directory: $CM_BUILD_DIR

      - name: Set build number
        script: |
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" || echo "0")
          BUILD_NUMBER=$((LATEST_BUILD_NUMBER + 1))
          cd $CM_BUILD_DIR
          agvtool new-version -all $BUILD_NUMBER
          echo "Build number set to: $BUILD_NUMBER"

      - name: Set up code signing
        script: |
          xcode-project use-profiles --project "$XCODE_PROJECT" --archive-method app-store
        working_directory: $CM_BUILD_DIR

      - name: Build ipa for App Store
        script: |
          xcodebuild -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            clean archive \
            CODE_SIGN_STYLE=Manual

          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist "$HOME/export_options.plist" \
            -exportPath build/ios/ipa
        working_directory: $CM_BUILD_DIR

      - name: Install fastlane
        script: |
          gem install fastlane

      - name: Install bundle dependencies
        script: |
          cd $CM_BUILD_DIR
          bundle install

      - name: Upload metadata and screenshots
        script: |
          cd $CM_BUILD_DIR
          bundle exec fastlane upload_metadata
        working_directory: $CM_BUILD_DIR

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - build/*.xcarchive
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - innaroshaproject@gmail.com
        notify:
          success: true
          failure: true

      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
